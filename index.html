<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 & 돌림판</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="theme-toggle">
        <button id="themeBtn">🌓</button>
    </div>

    <main id="app">
        <!-- 돌림판 페이지 -->
        <section id="wheelPage" class="page active">
            <h1>돌림판</h1>
            <div class="wheel-container">
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
                <div class="pointer"></div>
            </div>
            <div class="controls">
                <input type="text" id="optionInput" placeholder="옵션을 추가하세요">
                <button id="addOptionBtn">추가</button>
                <button id="spinBtn">돌리기</button>
            </div>
            <div id="result"></div>
        </section>

        <!-- AI 테스트 페이지 -->
        <section id="aiPage" class="page">
            <h2>AI 동물상 테스트</h2>
            <p>사진을 업로드하여 강아지상인지 고양이상인지 확인해보세요!</p>
            <div class="ai-controls">
                <label for="imageUpload" class="custom-file-upload">
                    📷 사진 업로드하기
                </label>
                <input type="file" id="imageUpload" accept="image/*" onchange="handleImageUpload(event)">
            </div>
            <div id="loading-spinner" class="hidden">모델 로딩 및 분석 중...</div>
            <div class="ai-content">
                <div id="image-preview-container" class="hidden">
                    <img id="face-image" src="#" alt="미리보기">
                </div>
                <div id="label-container"></div>
            </div>
        </section>

        <!-- 문의 페이지 -->
        <section id="contactPage" class="page">
            <h3>제휴 문의</h3>
            <p>함께 성장할 파트너를 찾습니다.</p>
            <form action="https://formspree.io/f/xqegggoe" method="POST" id="contactForm">
                <div class="form-group">
                    <input type="text" name="name" placeholder="성함/업체명" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용" required></textarea>
                </div>
                <button type="submit" id="submitBtn">문의하기</button>
            </form>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="showPage('wheelPage')">
            <span class="icon">🎡</span>
            <span class="label">돌림판</span>
        </button>
        <button class="nav-item" onclick="showPage('aiPage')">
            <span class="icon">🐶</span>
            <span class="label">동물상</span>
        </button>
        <button class="nav-item" onclick="showPage('contactPage')">
            <span class="icon">📩</span>
            <span class="label">문의</span>
        </button>
    </nav>

    <script src="main.js"></script>
</body>
</html>
